<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#162218"/>
      <stop offset="100%" stop-color="#090D0A"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Track ring (background) -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#1C2E1E" stroke-width="24"/>

  <!-- Progress ring: 75% filled (circumference = 2π×168 ≈ 1056) -->
  <!-- 75% = 792, gap = 264 -->
  <circle
    cx="256" cy="256" r="168"
    fill="none"
    stroke="#7EC850"
    stroke-width="24"
    stroke-linecap="round"
    stroke-dasharray="792 264"
    transform="rotate(-90 256 256)"
    filter="url(#glow)"
  />

  <!-- Small accent dot at end of arc (left-center, 75% = 270° from top) -->
  <circle cx="88" cy="256" r="13" fill="#7EC850"/>

  <!-- Inner dark fill to make checkmark visible -->
  <circle cx="256" cy="256" r="130" fill="#0C1510" opacity="0.55"/>

  <!-- Bold checkmark -->
  <path
    d="M168 262 L230 322 L352 192"
    stroke="#7EC850"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
